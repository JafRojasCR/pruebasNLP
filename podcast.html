<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Jeopardy — La Hablada de Paja Nocturna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Oswald', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: white;
            overflow: hidden;
            height: 100vh;
        }
        .font-anton { font-family: 'Anton', sans-serif; }
        .font-mono { font-family: 'DM Mono', monospace; }
        
        /* Animaciones Personalizadas */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cell-used {
            opacity: 0.2;
            pointer-events: none;
            transform: scale(0.95);
        }
        .reveal-anim {
            animation: revealEffect 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes revealEffect {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-enter {
            animation: zoomIn 0.3s ease-out;
        }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="h-16 flex items-center justify-between px-8 bg-slate-900/80 border-b-2 border-yellow-500 shadow-2xl z-20">
        <div class="flex items-center gap-3">
        
            <h1 class="text-2xl md:text-3xl font-anton text-yellow-400 tracking-wider uppercase drop-shadow-lg">
                La Hablada de Paja Nocturna - Jeopardy
            </h1>
        </div>
        <button onclick="openMenu()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
            <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </header>

    <!-- Board Stage -->
    <main id="stage" class="relative flex-1 flex items-center justify-center p-6 overflow-hidden">
        <div id="board" class="grid grid-cols-4 gap-4 w-full max-w-6xl h-full max-h-[80vh]">
            <!-- Headers y Celdas se generan por JS -->
        </div>

        <!-- Question Overlay -->
        <div id="q-overlay" class="fixed inset-0 z-50 hidden bg-slate-950/95 flex-col items-center justify-center p-10 text-center modal-enter">
            <div id="q-category" class="font-mono text-yellow-600 tracking-[0.3em] uppercase mb-2 text-sm md:text-base"></div>
            <div id="q-value" class="font-anton text-7xl md:text-9xl text-yellow-400 mb-8 drop-shadow-[0_0_30px_rgba(250,204,21,0.4)]"></div>
            
            <div class="w-32 h-1 bg-yellow-500/50 mb-10 rounded-full"></div>
            
            <div id="q-text" class="text-2xl md:text-5xl font-medium leading-tight max-w-4xl mb-12 px-4"></div>

            <!-- Answer Panel -->
            <div id="a-panel" class="hidden w-full max-w-3xl glass p-8 rounded-2xl border-yellow-500/30 reveal-anim mb-12">
                <span class="text-xs font-mono text-yellow-500 uppercase block mb-4 tracking-widest">Respuesta Correcta</span>
                <p id="a-text" class="text-xl md:text-3xl text-slate-200 font-light italic"></p>
            </div>

            <!-- Controls -->
            <div class="flex flex-wrap justify-center gap-6">
                <button id="btn-reveal" onclick="revealAnswer()" 
                    class="flex items-center gap-2 px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold rounded-xl shadow-lg transition-all active:scale-95 uppercase tracking-widest text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    Revelar Respuesta
                </button>
                <button onclick="closeQuestion()" 
                    class="px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl border border-white/10 transition-all active:scale-95 uppercase tracking-widest text-sm">
                    ↩ Volver al Tablero
                </button>
            </div>
        </div>
    </main>

    <!-- Bottom: Teams Section -->
    <footer class="bg-slate-900 border-t-2 border-yellow-500 p-4 flex items-center justify-center gap-6 overflow-x-auto">
        <div id="teams-container" class="flex items-center gap-8">
            <!-- Equipos aquí -->
        </div>
        
        <!-- Quick Team Controls -->
        <div class="flex flex-col gap-2 ml-4 border-l border-white/10 pl-6">
            <button onclick="addTeam()" title="Agregar Equipo" class="w-10 h-10 flex items-center justify-center rounded-full bg-green-600/20 hover:bg-green-600 text-green-400 hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </button>
            <button onclick="removeTeam()" title="Eliminar Equipo" class="w-10 h-10 flex items-center justify-center rounded-full bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
            </button>
        </div>
    </footer>

    <!-- Side Menu -->
    <div id="side-menu" class="fixed top-0 bottom-0 -right-80 w-80 bg-slate-900 z-[100] shadow-[-10px_0_30px_rgba(0,0,0,0.5)] transition-all duration-300 p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-anton text-2xl text-yellow-500 uppercase tracking-widest">Ajustes</h2>
            <button onclick="closeMenu()" class="text-slate-400 hover:text-white">✕</button>
        </div>
        <div class="flex flex-col gap-4">
            <button onclick="openGuide()" class="w-full py-4 glass text-left px-6 rounded-xl hover:bg-white/10 transition-all">📋 Guía de Solución</button>
            <button onclick="showWinner()" class="w-full py-4 glass text-left px-6 rounded-xl hover:bg-white/10 transition-all">🏆 Declarar Ganador</button>
            <button onclick="resetGame()" class="w-full py-4 bg-red-950/40 text-red-400 text-left px-6 rounded-xl hover:bg-red-900/60 transition-all mt-10">↺ Reiniciar Todo</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal" class="fixed inset-0 z-[150] hidden bg-black/90 items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-slate-900 border-2 border-yellow-500 w-full max-w-4xl max-h-[90vh] rounded-3xl overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h3 id="modal-title" class="font-anton text-2xl text-yellow-400 uppercase"></h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-2xl">✕</button>
            </div>
            <div id="modal-body" class="p-8 overflow-y-auto flex-1 text-slate-300 space-y-4"></div>
        </div>
    </div>

    <!-- Winner Banner Overlay -->
    <div id="winner-banner" class="fixed inset-0 z-[200] hidden bg-slate-950 flex-col items-center justify-center text-center p-10 modal-enter">
        <div class="text-yellow-500 font-mono tracking-[0.5em] mb-4">FIN DE LA PARTIDA</div>
        <h2 id="winner-label" class="text-5xl md:text-8xl font-anton text-white mb-4 uppercase"></h2>
        <div id="winner-score" class="text-4xl md:text-7xl text-yellow-400 font-anton mb-12"></div>
        <button onclick="location.reload()" class="px-10 py-4 bg-yellow-500 text-slate-950 font-bold rounded-full hover:scale-110 transition-transform">VOLVER A JUGAR</button>
    </div>

<script>
    /* ═══════════════════════════════════════════════
        CONFIGURACIÓN Y DATOS (Basado en el Podcast)
    ═══════════════════════════════════════════════ */
    const DATA = {
        "Redundancia 101": [
            { pts: 100, q: "¿Qué aerolínea internacional sufrió una caída masiva por un error de redundancia?", a: "United Airlines." },
            { pts: 200, q: "¿Cuál fue el fallo físico que causó la caída de la conexión de vuelos?", a: "Se safó un cable en uno de los routers centrales." },
            { pts: 300, q: "¿Qué tecnología omitió configurar el administrador de red para evitar el desastre?", a: "EtherChannel." },
            { pts: 400, q: "¿Durante cuánto tiempo aproximado se perdió la conexión de vuelos?", a: "Más de dos horas." },
            { pts: 500, q: "¿Cómo se llama el protocolo que evita bucles pero que también apoya la redundancia inicial?", a: "STP" }
        ],
        "El Estándar": [
            { pts: 100, q: "¿Cuál es el máximo de cables físicos que se pueden agrupar en un EtherChannel?", a: "Hasta 8 cables." },
            { pts: 200, q: "¿Cómo se llama el estándar abierto (IEEE) para la agregación de enlaces?", a: "LACP" },
            { pts: 300, q: "¿Cómo se llama el protocolo propietario de Cisco para esta misma función?", a: "PAgP." },
            { pts: 400, q: "En LACP, ¿cómo se le llama al modo que inicia activamente la negociación?", a: "Modo Activo" },
            { pts: 500, q: "En PAgP, ¿cuál es el término para el modo que espera a que el otro inicie la charla?", a: "Modo Automático" }
        ],
        "Configuración": [
            { pts: 100, q: "¿Qué requisito físico deben cumplir los puertos antes de ser agrupados?", a: "Deben ser del mismo tipo y tener la misma velocidad." },
            { pts: 200, q: "Si configuramos 8 cables, ¿cómo ve el switch lógicamente ese enlace?", a: "Como un único enlace lógico con el ancho de banda sumado." },
            { pts: 300, q: "¿Pueden ambos lados del EtherChannel estar configurados como activo (deseable)?", a: "Sí, no debería generar problemas." },
            { pts: 400, q: "¿Qué sucede si ambos lados del enlace se configuran en modo 'Pasivo (auto)'?", a: "El canal nunca se forma porque ninguno inicia la negociación." },
            { pts: 500, q: "¿Cómo se le llama en PAgP al modo que sí inicia la negociación?", a: "Modo Deseable (Desirable)." }
        ],
        "Trivia Nocturna": [
            { pts: 100, q: "¿Cuál fue el pico de oyentes mencionado en los últimos 3 minutos del programa?", a: "21 oyentes." },
            { pts: 200, q: "Según la analogía del programa, ¿qué pasa si 'usted no le habla y ella no le habla'?", a: "Nunca llegan a nada (como el modo pasivo/pasivo)." },
            { pts: 300, q: "¿Qué sucede con el tráfico si uno de los 8 cables del grupo se desconecta?", a: "Se redistribuye automáticamente entre los cables restantes sin caerse la red." },
            { pts: 400, q: "¿Cuál fue la IA que utilizaron los hablantes para obtener información?", a: "Claude." },
            { pts: 500, q: "¿Qué sensación genera el programa en sus escuchas?", a: "Un cagadón de risa" }
        ]
    };

    /* ═══════════════════════════════════════════════
        ESTADO GLOBAL
    ═══════════════════════════════════════════════ */
    let teams = [{ id: 1, name: "Equipo 1", score: 0 }, { id: 2, name: "Equipo 2", score: 0 }];
    let usedQuestions = new Set();
    let currentActiveQ = null;
    let revealed = false;

    /* ═══════════════════════════════════════════════
        LÓGICA DEL JUEGO
    ═══════════════════════════════════════════════ */
    
    function init() {
        renderBoard();
        renderTeams();
    }

    function renderBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        const cats = Object.keys(DATA);

        // Cabeceras
        cats.forEach(cat => {
            const el = document.createElement('div');
            el.className = "flex items-center justify-center glass border-b-4 border-yellow-500 font-anton text-yellow-500 uppercase text-center p-2 text-sm md:text-base rounded-t-xl";
            el.textContent = cat;
            board.appendChild(el);
        });

        // Filas de puntos
        for (let i = 0; i < 5; i++) {
            cats.forEach(cat => {
                const q = DATA[cat][i];
                const qId = `${cat}-${i}`;
                const isUsed = usedQuestions.has(qId);
                
                const cell = document.createElement('div');
                cell.className = `flex items-center justify-center glass rounded-xl cursor-pointer transition-all duration-300 hover:scale-105 hover:bg-yellow-500/20 group ${isUsed ? 'cell-used' : ''}`;
                cell.innerHTML = `
                    <span class="font-anton text-2xl md:text-4xl text-yellow-500 group-hover:text-yellow-300 transition-colors">
                        $${q.pts}
                    </span>
                `;
                cell.onclick = () => !isUsed && openQuestion(cat, i, q, qId);
                board.appendChild(cell);
            });
        }
    }

    function openQuestion(cat, idx, q, qId) {
        currentActiveQ = { ...q, id: qId, category: cat };
        revealed = false;
        
        document.getElementById('q-category').textContent = cat;
        document.getElementById('q-value').textContent = `$${q.pts}`;
        document.getElementById('q-text').textContent = q.q;
        document.getElementById('a-text').textContent = q.a;
        
        document.getElementById('a-panel').classList.add('hidden');
        document.getElementById('btn-reveal').classList.remove('hidden');
        document.getElementById('q-overlay').classList.remove('hidden');
        document.getElementById('q-overlay').classList.add('flex');
    }

    function revealAnswer() {
        revealed = true;
        document.getElementById('a-panel').classList.remove('hidden');
        document.getElementById('btn-reveal').classList.add('hidden');
    }

    function closeQuestion() {
        // Solo marcar como usada si fue revelada
        if (revealed && currentActiveQ) {
            usedQuestions.add(currentActiveQ.id);
        }
        document.getElementById('q-overlay').classList.add('hidden');
        document.getElementById('q-overlay').classList.remove('flex');
        currentActiveQ = null;
        renderBoard();
    }

    /* ═══════════════════════════════════════════════
        EQUIPOS Y PUNTAJES
    ═══════════════════════════════════════════════ */

    function renderTeams() {
        const container = document.getElementById('teams-container');
        container.innerHTML = '';

        teams.forEach(team => {
            const el = document.createElement('div');
            el.className = "flex flex-col items-center gap-2 group";
            el.innerHTML = `
                <input type="text" value="${team.name}" 
                    class="bg-transparent text-center font-bold text-slate-400 hover:text-white focus:text-yellow-400 outline-none uppercase text-xs tracking-widest transition-colors w-32"
                    onchange="updateTeamName(${team.id}, this.value)">
                <div class="flex items-center gap-4 bg-slate-800 p-2 rounded-2xl border border-white/5 shadow-inner">
                    <button onclick="updateScore(${team.id}, -1)" class="w-8 h-8 rounded-full hover:bg-red-500/20 text-red-500 transition-colors">−</button>
                    <div class="font-anton text-2xl md:text-3xl min-w-[80px] text-center">${team.score < 0 ? '-' : ''}$${Math.abs(team.score)}</div>
                    <button onclick="updateScore(${team.id}, 1)" class="w-8 h-8 rounded-full hover:bg-green-500/20 text-green-500 transition-colors">+</button>
                </div>
            `;
            container.appendChild(el);
        });
    }

    function updateScore(teamId, direction) {
        const amount = currentActiveQ ? currentActiveQ.pts : 100;
        teams = teams.map(t => {
            if (t.id === teamId) return { ...t, score: t.score + (amount * direction) };
            return t;
        });
        renderTeams();
    }

    function updateTeamName(id, val) {
        teams = teams.map(t => t.id === id ? { ...t, name: val } : t);
    }

    function addTeam() {
        if (teams.length >= 5) return;
        const newId = teams.length > 0 ? Math.max(...teams.map(t => t.id)) + 1 : 1;
        teams.push({ id: newId, name: `Equipo ${newId}`, score: 0 });
        renderTeams();
    }

    function removeTeam() {
        if (teams.length <= 1) return;
        teams.pop();
        renderTeams();
    }

    /* ═══════════════════════════════════════════════
        MODALES Y MENÚ
    ═══════════════════════════════════════════════ */

    function openMenu() { document.getElementById('side-menu').style.right = '0'; }
    function closeMenu() { document.getElementById('side-menu').style.right = '-20rem'; }

    function openGuide() {
        closeMenu();
        const body = document.getElementById('modal-body');
        document.getElementById('modal-title').textContent = "Guía de Respuestas";
        let html = '<div class="space-y-8">';
        Object.keys(DATA).forEach(cat => {
            html += `<div><h4 class="text-yellow-500 font-bold uppercase mb-2 border-b border-white/10 pb-1">${cat}</h4><ul class="space-y-4">`;
            DATA[cat].forEach(q => {
                html += `<li class="text-sm"><span class="text-yellow-600 font-mono mr-2">$${q.pts}</span> <span class="text-slate-100">${q.q}</span><br><span class="text-green-500/80 italic ml-10">R: ${q.a}</span></li>`;
            });
            html += `</ul></div>`;
        });
        html += '</div>';
        body.innerHTML = html;
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal').classList.add('flex');
    }

    function showWinner() {
        closeMenu();
        const maxScore = Math.max(...teams.map(t => t.score));
        const winners = teams.filter(t => t.score === maxScore);
        
        const label = document.getElementById('winner-label');
        const score = document.getElementById('winner-score');
        
        if (winners.length > 1) {
            label.textContent = "¡Empate!";
            score.textContent = winners.map(w => w.name).join(' & ');
        } else {
            label.textContent = winners[0].name;
            score.textContent = `$${winners[0].score}`;
        }
        
        document.getElementById('winner-banner').classList.remove('hidden');
        document.getElementById('winner-banner').classList.add('flex');
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal').classList.remove('flex');
    }

    function resetGame() {
        if (confirm("¿Seguro que quieres reiniciar? Se perderán todos los puntos.")) {
            location.reload();
        }
    }

    // Inicializar
    init();

</script>
</body>
</html>
